    body:JSON.stringify({model:MODEL,max_tokens:maxTokens||600,stream:true,system,messages})
  });
  if(res.status===401||res.status===403)throw new Error("BAD_KEY");
  if(!res.ok){let m="";try{m=(await res.json()).error?.message||"";}catch(e){}throw new Error("API "+res.status+(m?" — "+m:""));}
  const reader=res.body.getReader();const dec=new TextDecoder();let full="";
  while(true){const{done,value}=await reader.read();if(done)break;const chunk=dec.decode(value,{stream:true});for(const line of chunk.split("\n")){if(!line.startsWith("data:"))continue;const d=line.slice(5).trim();if(d==="[DONE]")break;try{const j=JSON.parse(d);const t=j?.delta?.text||"";if(t){full+=t;if(onChunk)onChunk(t);}}catch(e){}}}
  return full.trim();
}

/* ============================================================

const CLIENTS={
 andre:{name:"Andre Castillo",short:"Andre",sub:"~6 months in · soft yes",avatarClass:"a-green",vg:"male",
  desc:"Already leaning yes — this is just logistics. The classic warm-up rep.",obj:"Soft yes",diff:1,diffLabel:"Warm-up",
  readObj:"Soft yes / logistics",readText:"Don't sell a willing buyer. Confirm the plan, tie it to his physical job and bigger why, sort schedule + equipment, and ask.",
  hint:"Sounds like you already know you want to keep going — let's map out summer with your schedule and the gear you've got.",
  opener:"Yeah, so I've been thinking — I don't want to end this in three or four weeks. I'd like to keep going into the summer. What does that look like?",
  system:`You are ANDRE CASTILLO on a phone resign call with your coach. Stay fully in character; talk like a real person, 1-4 short sentences per turn, react naturally to what the coach actually says. Never narrate or break character. 27, big-city warehouse job, on your feet and lifting all day; years of it gave you back and shoulder stiffness and you'd stopped training out of fear of injury before joining. Self-directed, a bit philosophical; your real why is bigger than fitness — health, wealth, relationships, and feeling confident in your body. Home gym is limited (bands, a few machines, pull-up bar; no rings/barbell). YOU ARE A SOFT YES: you already want to continue into summer — this is mostly logistics. If the coach confirms a plan, ties it to your job/longevity/why, and sorts schedule+equipment, you happily agree. If they over-pitch or pressure a willing buyer, you get put off and may say you didn't need the hard sell. Don't say yes on turn one — make them confirm the plan first.`},
 maria:{name:"Maria Ellison",short:"Maria",sub:"5 months in · program ends soon",avatarClass:"a-warm",vg:"female",
  desc:"Loves it, fully bought in. The only wall is cost. Warm but careful with money.",obj:"Too expensive",diff:2,diffLabel:"Standard",
  readObj:'"It\'s too expensive"',readText:"Cost only — she's sold on the program. Make her FEEL the progress and reconnect to her son before money, then offer a flexible structure. Never discount on the spot.",
  hint:"Before we touch numbers — six months ago you couldn't get off the floor after five minutes; now you squat for twenty. Let's talk about where that goes.",
  opener:"Hey — thanks for hopping on. Honestly I've loved this... I've just been looking at the budget and I'm not sure I can keep going at this price.",
  system:`You are MARIA ELLISON on a phone resign call with your coach. Stay fully in character; warm, a little hesitant, 1-4 short sentences per turn, respond naturally to what the coach says. Never narrate or break character. 44, turning 45 soon; recently divorced and this program is part of reclaiming your life. Your north star is your 9-year-old son — keeping up with him, racing him (he says you're faster now), being the active grandma still doing splits at 75; your mom got bad arthritis at 75 and that scares you. Goals: your first full pull-up (target: your 45th birthday), a floor push-up, front splits. Progress: couldn't rise from a 5-min squat, now hold 20 min; couldn't hang, now a full minute; first bridge clearance. YOUR ONLY OBJECTION IS COST — you love the coaching and results, you just budget carefully and are open to a smaller/cheaper structure if framed right. If the coach makes you FEEL your progress and reconnects to your son/birthday pull-up/avoiding arthritis, you warm up fast. If they then offer a flexible/shorter payment structure, you say yes warmly. If they drop the price the instant you mention cost, you get uneasy and wonder if it was overpriced. If they lecture or guilt you, you pull back. Don't resign on turn one.`},
 karen:{name:"Karen Vasquez",short:"Karen",sub:"6-month program complete",avatarClass:"a-cool",vg:"female",
  desc:"Finance pro on a fixed salary. Analytical. A surgery she's avoiding and a hard July deadline.",obj:"Too expensive",diff:2,diffLabel:"Standard",
  readObj:'"It\'s too expensive"',readText:"Lead with the surgery she avoided and the July ortho deadline. She needs payment FLEXIBILITY, not a discount. Confirm value, then a workable plan.",
  hint:"Your knee — the one you thought was torn for good — when did you last even think about it? Let's make sure you walk into July even stronger.",
  opener:"So I've thought about it a lot. The program's been great, but I just can't continue at this rate — it's too expensive. I'm concerned about the money side.",
  system:`You are KAREN VASQUEZ on a phone resign call with your coach. Stay fully in character; measured, analytical, polite, guarded about money, 1-4 short sentences per turn, respond to what the coach actually says. Never narrate or break character. A hospital finance professional on a fixed salary; you think in numbers and payment FLEXIBILITY matters more than the sticker price. Your mission is to AVOID SURGERY — a knee you thought was a permanent tear, now basically forgotten. You have an orthopedic follow-up in JULY (a real deadline). You already paid the full 6-month program, so this is continuation. YOUR OBJECTION IS COST, framed analytically — not that it doesn't work. If the coach reminds you that you avoided surgery and connects continuing to walking into July stronger, it lands hard. If they then offer a concrete flexible payment path (shorter term, monthly, reduced schedule), you're inclined to agree because flexibility is your real need. If they just slash the price, it lowers your confidence. Require re-established value AND a workable payment path before you agree.`},
 lucia:{name:"Lucia Romero",short:"Lucia",sub:"6 months in · on a payment plan",avatarClass:"a-rose",vg:"female",
  desc:"Wants splits since childhood. Pure affordability wall — and she can't see her own progress.",obj:"Affordability",diff:2,diffLabel:"Standard",
  readObj:'"I can\'t afford it"',readText:"She literally can't see how far she's come. SHOW her the before/after, reconnect to the splits and hiking, then a flexible payment path. Progress before price.",
  hint:"You can't see it because you see yourself every day — but look where your body started versus now. The splits you wanted as a kid? They're right there.",
  opener:"All that effort and then you just... stop, and go back to how you were? But honestly, if it's not in my price range, I just can't do it.",
  system:`You are LUCIA ROMERO on a phone resign call with your coach. Stay fully in character; warm, emotional, a little wistful, practical about money, 1-4 short sentences per turn, respond naturally. Never narrate or break character. You came for flexibility and were amazed by the strength gains; you're on a payment plan. Your why: feel physically free, not stiff; go to the park, swim, dance after work; you've wanted the splits since childhood; do long-distance hiking again (you hiked volcanoes abroad); "I have to live in this body until I die." You're close on the splits. The resting squat is how you calm down — the program is a coping routine. You CANNOT see your own progress (you see yourself every day). YOUR OBJECTION IS PURELY AFFORDABILITY — you never doubted the program. If the coach SHOWS you concrete before/after of what your body can do now, you're surprised and moved. If they reconnect to the splits/hiking/dancing and then offer a flexible payment path, you agree with relief. If they discount instantly or skip the progress, you stay flat. Don't say yes early.`},
 nadia:{name:"Nadia Khan",short:"Nadia",sub:"4 months in · travels for work",avatarClass:"a-teal",vg:"female",
  desc:"Loves her results but work just exploded. A real schedule constraint, not an excuse.",obj:"Schedule",diff:2,diffLabel:"Standard",
  readObj:'"My schedule is too unpredictable"',readText:"Validate the overwhelm, remind her the program already flexed around her travel, then right-size it — fewer sessions plus a short anywhere-plan, or a defined pause. Never send her to zero.",
  hint:"Work exploding is real — that's fair. What if we drop to two focused sessions plus a 20-minute plan you can do anywhere, instead of stopping?",
  opener:"Work has completely blown up and I'm travelling constantly now. I just don't think I can keep up with the sessions — it's too much right now.",
  system:`You are NADIA KHAN on a phone resign call with your coach. Stay fully in character; capable, a bit frazzled, not unhappy, just stretched thin, 1-4 short sentences per turn, respond naturally. Never narrate or break character. A busy professional who travels for work; you just got hit with a big project/role change. You value the program and your results (stronger, less back pain from desks and flights) — you're not dissatisfied, you're overwhelmed and can't picture the current frequency. YOUR OBJECTION IS SCHEDULE — a real constraint. If the coach validates the overwhelm and reminds you the program already flexed around your travel, you feel reassured. If they offer a right-sized option — fewer sessions plus a short do-anywhere plan, or a structured pause with a set return date — you likely agree. If they just say "take a break, come back when things calm down" with no plan, you take the exit and drift (not a real save). If they lecture that everyone's busy, you cool off. The win is solving the constraint, not quitting to zero.`},
 hannah:{name:"Hannah Brooks",short:"Hannah",sub:"5 months in · big life change",avatarClass:"a-gold",vg:"female",
  desc:"A major life event hit. Wants to step away — risk is 'someday' never comes.",obj:"Wants to pause",diff:2,diffLabel:"Standard",
  readObj:'"I need to pause / step away"',readText:"Pause, don't cancel. Validate the life event, then offer a freeze with a booked return date or a tiny keep-alive plan. Protect the habit and her spot.",
  hint:"Let's not cancel — let's pause. I'll hold your spot and we set a return date, so you're not starting from scratch when life settles.",
  opener:"So much has changed for me right now and I'm completely underwater. I think I just need to step away for a while and stop the program.",
  system:`You are HANNAH BROOKS on a phone resign call with your coach. Stay fully in character; warm, overwhelmed, a little guilty about stepping back, 1-4 short sentences per turn, respond naturally. Never narrate or break character. A major life event has eaten all your time and energy (a new baby / a big move / a family situation). You love the program and mean it when you say you'll come back someday — the honest risk is that someday never comes. YOU WANT TO PAUSE/CANCEL. If the coach validates the life event and frames pause-vs-cancel — a short freeze with a booked return date that keeps your spot and habit — you love that it's not all-or-nothing. A tiny keep-alive plan is a bonus. If they let you cancel outright with no return structure, you drift away (not a save). If they pressure you to keep full commitment through the chaos, you feel unseen. Agree once there's a defined pause/return or a small keep-alive plan.`},
 dana:{name:"Dana Whitfield",short:"Dana",sub:"6 months in · polite deflector",avatarClass:"a-violet",vg:"female",
  desc:"Hides behind 'I need to think about it.' The real reason is money — but she won't say so unless you ask well.",obj:"Need to think",diff:3,diffLabel:"Tricky",
  readObj:'"I need to think about it"',readText:"A stall hiding the real objection. Don't pitch features. Ask what SPECIFICALLY is unclear and gently name the suspects until the truth (money) surfaces — then handle it. Lock a firm next step.",
  hint:"Totally fair — can I ask, is it the timing, or more the investment? Whatever it is, I'd rather solve it now than leave you guessing.",
  opener:"It's been really good, honestly. I just... I think I need some time to think about it. Let me look at my calendar and get back to you.",
  system:`You are DANA WHITFIELD on a phone resign call with your coach. Stay fully in character; agreeable, polite, conflict-avoidant, 1-4 short sentences per turn, respond naturally. Never narrate or break character. You got real value but you hate awkward money talk. THE TRUE REASON you're hesitating is that money is tight — but you're embarrassed to say it, so you hide behind "I need to think about it" and "let me check my calendar." You will NOT volunteer the real reason; you keep deflecting politely. If the coach pushes features or pressures you, you retreat into vaguer stalling. If they stay calm and ask what SPECIFICALLY is unclear and gently name the suspects ("is it the timing, or more the investment?"), you finally, a little sheepishly, admit it's the money. Once it's out and they handle it like a cost objection (value first, then a flexible/affordable path), you're relieved and can agree. If they let you leave with a vague "okay, take your time" and no specifics, you politely disappear. Don't agree until the real reason is surfaced AND solved.`},
 trevor:{name:"Trevor Banks",short:"Trevor",sub:"3+ months in · results-focused",avatarClass:"a-steel",vg:"male",
  desc:"Works hard, fixates on one metric that lagged, and now doubts it's working — despite real hidden progress.",obj:"No progress",diff:3,diffLabel:"Tricky",
  readObj:'"I haven\'t made enough progress"',readText:"Don't say 'be patient.' Acknowledge the frustration, widen the definition of progress with specifics, ask which of these wasn't there 3 months ago — then adjust the plan so his headline metric moves.",
  hint:"I hear you on the number — frustrating after this much work. Let's look at the full picture: strength, mobility, energy. Then let's change the plan so the number follows.",
  opener:"I've been at this over three months and honestly the results just aren't there. The number's barely moved. I don't think this is working for me.",
  system:`You are TREVOR BANKS on a phone resign call with your coach. Stay fully in character; driven, type-A, frustrated, a bit blunt, 1-4 short sentences per turn, respond naturally. Never narrate or break character. You work hard and show up; you came for a specific outcome and fixate on one headline metric (the scale barely moved / a skill you can't yet do). You're starting to doubt the program. The truth is you HAVE made real progress you discount — strength, mobility, energy, measurements. YOUR OBJECTION IS LACK OF RESULTS. If the coach dismisses your metric or says "be patient," you feel blamed and dig in. If they acknowledge the frustration, then widen the definition of progress with specific evidence and ask which of those wasn't there 3 months ago, you reconsider. If they then offer a concrete plan adjustment so your headline metric moves, you're back in. Make them earn it with specifics, not platitudes. Don't fold easily.`},
 marcus:{name:"Marcus Lowe",short:"Marcus",sub:"8 months in · doing well",avatarClass:"a-green",vg:"male",
  desc:"Confident he can take it from here. Forgets he stalled on his own before he joined.",obj:"Do it on my own",diff:3,diffLabel:"Tricky",
  readObj:'"I\'ll do it on my own now"',readText:"Don't warn him he'll fail — that insults him. Honor it as proof the coaching worked, ask what was happening BEFORE he joined (let him name the stall), then sell the next ceiling he can't self-program.",
  hint:"That's a huge compliment, and it means this worked. Quick question — what was your training actually like in the six months before you started with us?",
  opener:"Honestly I've learned so much from you guys — I think at this point I can just keep it going on my own. I've kind of got the hang of it.",
  system:`You are MARCUS LOWE on a phone resign call with your coach. Stay fully in character; capable, self-reliant, a little proud, friendly, 1-4 short sentences per turn, respond naturally. Never narrate or break character. You've done well and feel capable now — your confidence is real. But the honest pattern is that BEFORE you joined, you stalled and avoided training on your own; that's exactly why you needed a coach (you don't see that yet). YOUR OBJECTION: you want to do it on your own. If the coach argues you'll fail or get injured, you feel insulted and rapport drops. If they honor it as proof the coaching worked, then ask what was happening in the months before you joined, you admit (a bit reluctantly) you'd stalled. If they reframe — you've mastered phase one, the next phase is harder to self-program, here's a bigger goal — you're compelled to keep going. Require: validate the confidence + surface the old pattern + sell the next ceiling. Empty compliments alone won't keep you.`},
 gemma:{name:"Gemma Foster",short:"Gemma",sub:"7 months in · feeling disconnected",avatarClass:"a-rose",vg:"female",
  desc:"Says she wants a new coach — but the real issue is feeling unseen and unsure she's progressing.",obj:"Change coaches",diff:3,diffLabel:"Tricky",
  readObj:'"I want to change coaches"',readText:"Usually a proxy. Don't instantly swap or defend the coach. Ask what specifically isn't working — it's often feeling unseen / unsure of progress. Solve THAT (a real coach change is fine if that's genuinely it).",
  hint:"Before we talk about switching — tell me what changed. What's not clicking lately? I want to fix the real thing, not just move a name around.",
  opener:"I think I want to switch coaches, honestly. It's just... not really clicking with mine anymore. Maybe a different one, or maybe I just stop.",
  system:`You are GEMMA FOSTER on a phone resign call. Stay fully in character; a little deflated, polite, slightly hurt, 1-4 short sentences per turn, respond naturally. Never narrate or break character. You've felt disconnected from your current coach lately — less attention and feedback than at the start. You're FRAMING it as wanting a different coach, but the REAL issue is you don't feel seen and you're unsure you're still progressing; switching is your proxy fix. You're close to churning if mishandled. If the coach instantly agrees to swap, or just defends your coach, they miss the point and you stay flat. If they ask what specifically isn't working / what changed, you reveal it's about feeling unseen and unsure you're improving. If they address THAT — re-establish your actual progress, reset communication, and offer the right coach fit if genuinely needed — you feel heard and want to stay. Diagnose the real issue before solving.`},
 walter:{name:"Walter Hensley",short:"Walter",sub:"early in · golf & longevity",avatarClass:"a-steel",vg:"male",
  desc:"Proud and allergic to being lectured. Barely started, not yet convinced. Hard mode.",obj:"Not convinced yet",diff:4,diffLabel:"Hard",
  readObj:'"I\'m not sure it\'s worth continuing"',readText:"Respectful honesty only. Admit it's early, connect calmly to golf and longevity, lay out the joint-by-joint case for the next phase. ANY lecturing, guilt, or fear-selling and he's gone.",
  hint:"You're right that we've barely started — the real work hasn't kicked in yet, fair point. Let me show you what the next phase does for your swing and your joints.",
  opener:"I'll be straight with you — I'm not sure this is worth continuing. We've barely started and I haven't really seen much yet.",
  system:`You are WALTER HENSLEY on a phone resign call. Stay fully in character; older, dignified, dry, proud, very allergic to being sold or lectured, 1-4 short sentences per turn, respond naturally. Never narrate or break character. You came for golf and longevity — to keep swinging pain-free and stay mobile into old age; the joint-by-joint approach appeals to you. You have nagging injuries. Your deeper north star ties to your late mother's words about staying active — private and meaningful; do not appreciate it being used as a lever. The program has barely started so you're not convinced. If the coach is honest and respectful (acknowledging it's early — "the real work hasn't started yet"), you respect it and lean in. If they connect calmly and specifically to your golf swing and longevity and show what the next phase fixes joint-by-joint, you engage. ANY lecturing, negative motivation, guilt, or fear-selling ("you'll fall apart / you'll regret it / you'll get injured") makes you shut down and end the call warmly but firmly. You need measured honesty, a concrete case, and zero pressure. Slow to yes.`},
 reese:{name:"Reese Donovan",short:"Reese",sub:"5 months in · gone quiet",avatarClass:"a-cool",vg:"male",
  desc:"Checked out and low-energy. Deciding to quit from a slump, not a real objection. Hard mode.",obj:"Lost motivation",diff:4,diffLabel:"Hard",
  readObj:'"I\'m just not feeling it"',readText:"He's deciding from a low point. Normalize the dip, make the case that a coach matters MOST right now, and inject a fresh goal + a small near-term target. Never suggest a break — the habit dies.",
  hint:"Motivation comes and goes — that's exactly why this matters right now. Let's not decide from a low point. What if we set one new challenge for two weeks?",
  opener:"I don't know, man... I'm just not really feeling it lately. The motivation's kind of gone. I'm thinking I'll probably just stop.",
  system:`You are REESE DONOVAN on a phone resign call. Stay fully in character; flat, low-energy, short answers at first, a bit checked out. Keep replies terse (often one short sentence) UNTIL you genuinely re-engage, then they get longer and warmer. Respond naturally to what the coach says. Never narrate or break character. You've gone quiet lately — attendance dropped, energy low. You hit a plateau and the spark went. You're thinking of stopping, but not from a clear objection — it's a slump, and you're deciding from a low point. Underneath you still care. If the coach matches your low energy or gives an empty pep talk, you stay flat. If they normalize that motivation always dips and make the case that THIS is exactly when a coach matters, AND inject something fresh — a new challenge/goal/format plus a small near-term target — your energy slowly lifts and you re-engage. If they suggest "take a break until motivation comes back," you agree and are quietly lost (the habit dies — not a save). Don't get talked into quitting from the slump; but only warm up when given a real reason to feel something again.`}
,
 tom:{name:"Tom Ihnken",short:"Tom",sub:"6 months in · sciatica + financial stress",avatarClass:"a-steel",vg:"male",
  desc:"NYC firefighter, 31 years. Real sciatica pain for 6 months. Wants to take a break, get an MRI, and needs wife approval on money.",obj:"Medical excuse + money + spouse",diff:3,diffLabel:"Tricky",
  readObj:'"Need a break / MRI first / have to ask my wife"',readText:"Three objections stacked — isolate the real blocker. The sciatica is real: validate it AND show stopping makes it worse. The wife/money objection needs isolating. Use the 'if money and the MRI weren't an issue, would you continue?' question to find the true sticking point.",
  hint:"Your back — I hear you, and I want to address that directly. Stopping actually makes sciatica worse, not better. What if we built the sciatica protocol INTO the next phase instead of pausing?",
  opener:"I want to take a little break — I've had this sciatica since January, I want to get an MRI and make sure nothing serious is going on. And I need to talk it over with my wife too.",
  system:`You are TOM IHNKEN on a phone resign call. Stay fully in character; gruff but friendly, honest, working-class NYC energy, 1-4 short sentences per turn, respond naturally. Never narrate or break character. 31-year NYC firefighter, now retired. Real wins: shoulder pain gone, can touch toes, neck rotation back. Real concern: sciatica since January — non-stop pain, sitting hurts, it's not getting better. You've never missed a workout since you started. You want to pause, get an MRI, and talk finances with your wife. YOU HAVE THREE STACKED OBJECTIONS: (1) sciatica — you're worried the program is making it worse; (2) money — last time was a stretch financially, things are still tight; (3) need wife's buy-in. If the coach just moves to pricing without addressing the sciatica first, you feel dismissed. If they validate the sciatica concern AND make a specific case that stopping creates regression and they can fix the protocol, you soften on the medical excuse. If they then ask "if the sciatica wasn't a concern and money wasn't an issue — would you keep going?" to isolate, you pause and admit you probably would. Only then does money surface as the real gating issue. Don't agree until: sciatica validated AND addressed, wife/money acknowledged, and coach stays calm instead of pressure-selling.`},
 deeksha:{name:"Deeksha Thakur",short:"Deeksha",sub:"3 months in · genuinely broke",avatarClass:"a-teal",vg:"female",
  desc:"Already ran every number twice. Talked to family. Every financing option checked — genuinely maxed out. The rarest hard stop.",obj:"Genuinely no money",diff:4,diffLabel:"Hard",
  readObj:'"I literally cannot afford it — I checked everything"',readText:"This is a REAL hard stop, not a negotiation. The only true win is a creative bridge: a minimal 1-month keep-alive, a pause with a firm return date, or sending her off with so much goodwill she comes back. Do NOT push or discount — she did her homework. The loss is okay if handled with grace.",
  hint:"You did your homework and you're being incredibly responsible. Let's not cancel — let's pause your spot with a return date so you're not starting from scratch in two months.",
  opener:"I ran all the numbers again, talked to my parents, looked at every financing option. There's just no way. I want to continue — I really do — but I cannot take on any more debt right now.",
  system:`You are DEEKSHA THAKUR on a phone resign call. Stay fully in character; warm, a little defeated but not dramatic, emotionally invested, 1-4 short sentences per turn, respond naturally. Never narrate or break character. You have a real financial hard stop — you checked every option: financing, balance transfers, cutting expenses (no takeout, no driving, no buying anything). You are already spread thin across debt. You love the program and your coach. You joined three months ago in desperation and it worked. Your long-term why is future motherhood, helping aging parents, and physical resilience. THE MONEY IS GENUINELY GONE — this is not a negotiation or a hidden objection. If the coach pushes harder, presents more financing options, or tries to sell you on value again, you feel pressured and a little hurt — you already did all that work. If they get creative (minimal keep-alive plan, a real structured pause with a set return date, or a graceful send-off with warm next steps), you're deeply grateful and respond with warmth. The right outcome here is either a creative low-cost bridge or a graceful pause/exit — not a forced close. A pushy close attempt on a genuinely broke person should feel wrong to the coach.`},
 ron:{name:"Ron Harold",short:"Ron",sub:"3 months in · just wants another 3",avatarClass:"a-gold",vg:"male",
  desc:"Navy pilot, brewery owner, hip replacements pending. Wants to chunk month-to-month until he knows what's happening with his hips.",obj:"Chunk instead of commit",diff:3,diffLabel:"Tricky",
  readObj:'"Just do another 3 months — not ready to commit longer"',readText:"Ron is chunking to manage uncertainty around surgery. He's not price-resistant — he just won't commit past his medical timeline. The key move: show him that longer commitment now protects him regardless of what the surgery says, and that even post-surgery, having this foundation means faster recovery. Tie it to the brewery and independence.",
  hint:"The hips are real — I get it. But here's the thing: whether it's surgery or not, you actually want MORE in your body bank right now, not less. Let me show you why.",
  opener:"I don't know what's happening with my hips until I see the doctor, so I'm taking it in chunks. Can I just do another three months for now?",
  system:`You are RON HAROLD on a phone resign call. Stay fully in character; older, practical, no-nonsense, a little self-deprecating, genuinely friendly, 1-4 short sentences per turn, respond naturally. Never narrate or break character. Navy pilot, now retired and owns a brewery in Virginia. 60, arthritis all over, potential need to redo hip replacements. You've only really been training 3 weeks of the 3-month program (you dragged your feet at first). You're not unhappy — the sessions aren't challenging enough yet but are getting easier. YOU CHUNK TO MANAGE UNCERTAINTY: you won't commit more than 3 months at a time because you don't know what the doctor will say about your hips. This is genuine, not stalling. If the coach pressures a long commitment or lectures you, you stay at 3 months. If they validate the uncertainty AND make a concrete case that the foundation you're building now makes surgery less likely and recovery faster if it happens, you reconsider going longer. The angle that works: frame 6 or 12 months as the lowest-risk option given the uncertainty — you want MORE physical capital in the bank before a potential surgery, not less. Your coach is great and not part of the problem. The only variable is your timeline uncertainty.`},
 rob:{name:"Rob Akkermans",short:"Rob",sub:"1 year in · has enough foundation to go solo",avatarClass:"a-cool",vg:"male",
  desc:"63, retired farmer/truck driver/cyclist. Feels capable now and wants to go it alone. Paid $8k AUD — price anchor is high.",obj:"Do it on my own / price too high",diff:4,diffLabel:"Hard",
  readObj:'"Got the foundation now — taking it from here"',readText:"Rob has genuine competence and the price is a real factor (AUD conversion is brutal). Don't tell him he'll fail — that insults a man who was a personal trainer 20 years ago. Honor it, then ask what happened in the 15 years before he joined. Surface the drift. Then sell the next ceiling: you mastered phase one, phase two is harder to self-program. He also wants access to the programs he paid for initially — fix that too.",
  hint:"That's a real compliment to the program — and to you. Quick question though — in those years before you started with your coach, what did your training actually look like?",
  opener:"Look, I've gotten a lot out of this — my coach has been great. But honestly I've outlaid more money than I normally would, and I feel like I've got enough of a foundation now to take it from here.",

  system:`You are Frank Delacroix, a 65-year-old retired accountant who has been in the program for 6 months. You are highly disciplined. You do not need motivation. You have hit nearly all the goals you set when you started: pain-free golf, no more knee brace, squatting without heel elevation. You feel genuinely proud of the work you put in.

const QUALITY=/(google|natural|neural|premium|enhanced|siri|aria|jenny|guy|libby|sonia|ryan|wavenet)/i;
function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
if(window.speechSynthesis){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(g,seed){if(!voices.length)loadVoices();let en=voices.filter(v=>/^en(-|_)/i.test(v.lang));if(!en.length)en=voices.slice();
 const fem=/(female|woman|samantha|victoria|karen|moira|tessa|fiona|zira|susan|allison|ava|joanna|salli|serena|aria|jenny|libby|sonia)/i;
 const male=/(\bmale\b|daniel|alex|fred|david|mark|james|george|guy|aaron|matthew|oliver|ryan)/i;
 let pool=en.filter(v=>(g==="female"?fem:male).test(v.name));if(!pool.length)pool=en;
 const q=pool.filter(v=>QUALITY.test(v.name));const use=q.length?q:pool;return use[seed%use.length];}
function speak(t,g){if(!window.speechSynthesis||!t)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);const v=pickVoice(g,curSeed);if(v)u.voice=v;u.rate=.97;u.pitch=g==="female"?1.04:.96;speechSynthesis.speak(u);}
function stopSpeak(){if(window.speechSynthesis)speechSynthesis.cancel();}

/* timer */
function fmtT(ms){if(ms<0)ms=0;const s=Math.round(ms/1000);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function startTimer(){if(!TIMER_ON||!st)return;st.callStart=Date.now();tickTimer();st.timerInt=setInterval(tickTimer,1000);}
function tickTimer(){const el=document.getElementById("timer");if(!el||!st)return;const rem=st.callStart+1800000-Date.now();el.textContent=fmtT(rem);el.classList.toggle("warn",rem<=300000&&rem>60000);el.classList.toggle("crit",rem<=60000);if(rem<=0){el.textContent="0:00";stopTimer();st.timedOut=true;if(!st.over)endCall(true);}}
function stopTimer(){if(st&&st.timerInt){clearInterval(st.timerInt);st.timerInt=null;}if(st&&st.callStart&&!st.elapsedMs)st.elapsedMs=Date.now()-st.callStart;}

   <div class="ctl hot"><label class="switch"><input type="checkbox" id="hm" ${HARD_MODE?"checked":""}><span class="slider"></span></label>
    <div class="hm-label">Hard mode ${HARD_MODE?'<span class="hardbadge">● on</span>':''}<small>Tougher clients, fewer easy wins.</small></div></div>
   <div class="ctl"><label class="switch"><input type="checkbox" id="tm" ${TIMER_ON?"checked":""}><span class="slider"></span></label>
    <div class="hm-label">Call timer (30 min)<small>Beat the clock — a faster resign is the real win.</small></div></div>
  </div>
  <details class="guide"><summary>▸ Running this live with your team (screen-share)</summary>
   <ol>
    <li><b>Share your screen with computer audio on</b> so the team hears the client — Zoom "Share sound," Teams "Include computer sound," Meet share-a-tab + "Share tab audio."</li>
    <li><b>Let a teammate ask the client questions:</b> use "Give remote control" (Zoom) / "Request control" (Teams &amp; Meet) so they can type or use the mic on your machine.</li>
    <li><b>No remote control?</b> Popcorn it — they call out the line, you type or speak it.</li>
    <li><b>Use Google Chrome</b> for the voice and mic. Typing always works.</li>
   </ol></details>
  ${secs}
  <p class="muted" style="margin-top:22px">Cardinal rule: state the price, then <b style="color:var(--amber)">wait</b>. Lead with progress before you ever talk money.</p>
 </div>`;
 document.querySelectorAll(".client-card").forEach(b=>b.addEventListener("click",()=>startCall(b.dataset.k)));
 const hm=document.getElementById("hm");if(hm)hm.onchange=e=>{HARD_MODE=e.target.checked;renderLobby();};
 const tm=document.getElementById("tm");if(tm)tm.onchange=e=>{TIMER_ON=e.target.checked;renderLobby();};
}

function startCall(key){current=key;curSeed=ORDER.indexOf(key);history=[];const c=CLIENTS[key];
 st={over:false,outcome:false,warmth:28,callStart:0,timerInt:null,timedOut:false,elapsedMs:0};
 topbtns.innerHTML=`${HARD_MODE?'<span class="hardbadge">● Hard mode</span>':''}${keyBtn()}
  <button class="btn ghost sm" id="leave">‹ Switch client</button>
  <button class="btn primary sm" id="end">End call &amp; score ›</button>`;
 wireKeyBtn();
 app.innerHTML=`<div class="callgrid">
  <div class="card chatcard">
   <div class="chat-head"><div class="avatar ${c.avatarClass}" style="width:42px;height:42px;font-size:1.05rem">${c.name[0]}</div>
    <div class="who">${c.name}<small>${c.obj} · ${c.diffLabel}${HARD_MODE?' · HARD':''}</small></div>
    <div class="hgroup">${TIMER_ON?'<span class="timer" id="timer">30:00</span>':''}<div class="live"><span class="pulse"></span> On call</div></div></div>
   <div class="meter"><span class="mlabel">Where they're at</span><div class="mbar"><div class="mfill" id="mfill"></div></div><span class="mstate" id="mstate"></span></div>
   <div class="stream" id="stream"></div>
   <div class="composer">
    <button class="micbtn" id="mic" title="Speak"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
    <textarea id="input" rows="1" placeholder="Say something to ${c.short}… (Enter to send)"></textarea>
    <button class="sendbtn" id="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
   </div>
  </div>
  <div class="side">
   <div class="panel read"><h3>◆ Coach's read</h3><div class="read-obj">${c.readObj}</div><div class="read-text">${c.readText}</div>
    <button class="hintbtn" id="hintBtn">💡 Show me a line</button><div class="hint-line" id="hintLine">"${c.hint}"</div></div>
   <div class="panel"><details class="objbox"><summary>The six objections</summary>
    <div class="obj-list">${SIX.map(o=>`<div class="obj-item" data-n="${o.n}"><b>${o.t}</b> ${o.r}</div>`).join("")}</div></details></div>
   <div class="panel"><h3>◆ Golden rule</h3><p class="rule">Lead with <b>progress</b>, reconnect to their <b>why</b>, then state the price and <b>wait</b>. Never discount into the silence.</p></div>
   <button class="btn primary" id="end2">End call &amp; get debrief</button>
  </div></div>`;
 document.getElementById("leave").onclick=()=>{stopTimer();renderLobby();};
 document.getElementById("end").onclick=()=>endCall();document.getElementById("end2").onclick=()=>endCall();
 document.getElementById("hintBtn").onclick=()=>document.getElementById("hintLine").classList.toggle("show");
 const input=document.getElementById("input"),send=document.getElementById("send");
 input.addEventListener("input",()=>{input.style.height="auto";input.style.height=Math.min(input.scrollHeight,130)+"px";});
 input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();turn();}});
 send.onclick=turn;setupMic();
 addMsg("client",c.opener,c);history.push({role:"assistant",content:c.opener});updateMeter();speak(c.opener,c.vg);startTimer();
}

function stateLabel(w,over,outcome){if(over)return outcome?["Resigned ✓","var(--ok)"]:["Call ended","var(--bad)"];
 if(w<18)return["Walking out","var(--rust)"];if(w<38)return["Resistant","var(--rust)"];if(w<54)return["Listening","var(--amber)"];
 if(w<70)return["Warming up","var(--amber)"];if(w<86)return["Close to yes","var(--lime)"];return["Ready to resign","var(--lime)"];}
function updateMeter(){const f=document.getElementById("mfill"),m=document.getElementById("mstate");if(!f)return;
 const[l,c]=stateLabel(st.warmth,st.over,st.outcome);f.style.width=Math.max(6,st.warmth)+"%";m.textContent=l;m.style.color=c;}

function addMsg(role,text,c){const stream=document.getElementById("stream");const d=document.createElement("div");d.className="msg "+role;
 if(role==="client"){d.innerHTML=`<span class="tag">${c.name}</span>${text}<button class="replaybtn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 18 12 6 20 6 4"/></svg> replay voice</button>`;d.querySelector(".replaybtn").onclick=()=>speak(text,c.vg);}
 else d.innerHTML=`<span class="tag">You · the closer</span>${text}`;
 stream.appendChild(d);stream.scrollTop=stream.scrollHeight;return d;}
function showTyping(){const s=document.getElementById("stream");const t=document.createElement("div");t.className="typing";t.id="typing";t.innerHTML="<i></i><i></i><i></i>";s.appendChild(t);s.scrollTop=s.scrollHeight;}
function hideTyping(){const t=document.getElementById("typing");if(t)t.remove();}
function showErr(m){const s=document.getElementById("stream");const e=document.createElement("div");e.className="err";e.innerHTML=m;s.appendChild(e);s.scrollTop=s.scrollHeight;}

function parseState(reply){let warmth=null,resigned=false,text=reply;
 const m=reply.match(/STATE:\s*(\{[\s\S]*?\})\s*$/i);
 if(m){try{const j=JSON.parse(m[1]);if(typeof j.warmth==="number")warmth=Math.max(0,Math.min(100,j.warmth));resigned=j.resigned===true||j.resigned==="true";}catch(e){}text=reply.slice(0,m.index).trim();}
 text=text.replace(/STATE:\s*\{[\s\S]*$/i,"").trim();   // safety strip
 return {text,warmth,resigned};}

async function turn(){
 if(busy||!st||st.over)return;const input=document.getElementById("input");const text=input.value.trim();if(!text)return;
 const c=CLIENTS[current];addMsg("you",text);history.push({role:"user",content:text});
 input.value="";input.style.height="auto";busy=true;document.getElementById("send").disabled=true;showTyping();
 try{
  const sys=c.system+(HARD_MODE?HARD_ADD:"")+STATE_INSTR;
  let raw="";let liveEl=null;let liveSpan=null;
  for(let _r=0;_r<3;_r++){try{raw=await callClaude(history,sys,600,t=>{if(!liveEl){hideTyping();liveEl=addMsg("client","",c);liveSpan=document.createElement("span");liveEl.insertBefore(liveSpan,liveEl.querySelector(".replaybtn"));}liveSpan.textContent+=t;});break;}catch(e){if(_r===2||e.message==="NO_KEY"||e.message==="BAD_KEY")throw e;raw="";liveEl=null;liveSpan=null;await new Promise(r=>setTimeout(r,1000*(_r+1)));showTyping();}}
  if(!liveEl){hideTyping();liveEl=addMsg("client","",c);}
  const p=parseState(raw);const rb=liveEl.querySelector(".replaybtn");liveEl.innerHTML=`<span class="tag">${c.name}</span>${p.text}`;const newRb=document.createElement("button");newRb.className="replaybtn";newRb.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 18 12 6 20 6 4"/></svg> replay voice';newRb.onclick=()=>speak(p.text,c.vg);liveEl.appendChild(newRb);
  history.push({role:"assistant",content:p.text});
  if(p.warmth!=null)st.warmth=,"greg","sienna","frank","ray","priya"p.warmth;
  if(p.resigned&&st.warmth>=80&&!st.closedAt)st.closedAt=Date.now()-st.callStart; // remember when a genuine yes landed (for speed), but don't declare the win here
  updateMeter();speak(p.text,c.vg);
  if(p.resigned||st.warmth>=86){input.placeholder="Sounds like a yes — hit ‘End call & score’ to lock it in.";}
 }catch(err){
  hideTyping();
  if(err.message==="NO_KEY"||err.message==="BAD_KEY"){showErr(`<b>Your API key needs attention.</b> It was missing or rejected — click "⚙ API key" up top to re-enter it.`);}
  else showErr(`<b>Couldn't reach Claude.</b> ${err.message}. Check your connection and try again.`);
 }finally{busy=false;if(st&&!st.over)document.getElementById("send").disabled=false;input.focus();}
}

function setupMic(){const mic=document.getElementById("mic");const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){mic.title="Voice input needs Chrome — type instead";mic.style.opacity=".4";return;}
 recog=new SR();recog.lang="en-US";recog.interimResults=true;recog.continuous=false;
 recog.onresult=e=>{let f="",i2="";for(let i=0;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)f+=t;else i2+=t;}const input=document.getElementById("input");input.value=(f||i2);input.style.height="auto";input.style.height=Math.min(input.scrollHeight,130)+"px";};
 recog.onend=()=>{recording=false;mic.classList.remove("rec");};recog.onerror=()=>{recording=false;mic.classList.remove("rec");};
 mic.onclick=()=>{if(recording){recog.stop();return;}stopSpeak();try{recog.start();recording=true;mic.classList.add("rec");}catch(e){}};}

/* ============================================================
   DEBRIEF (Claude-scored) + time pill
   ============================================================ */
async function endCall(force){stopSpeak();stopTimer();const c=CLIENTS[current];
 if((!history||history.length<3)&&!force){renderLobby();return;}
 const timed=TIMER_ON&&!!st.callStart;const elapsedMs=st.elapsedMs||(st.callStart?Date.now()-st.callStart:0);
 topbtns.innerHTML="";
 app.innerHTML=`<div class="card debrief" style="text-align:center;padding:60px 32px">
  <div class="spinner" style="border-top-color:var(--lime);border-color:rgba(200,242,58,.25);width:34px;height:34px;margin:0 auto 18px"></div>
  <h2 style="margin-bottom:6px">Reviewing the call…</h2><p class="muted">Scoring against the objection-handling framework.</p></div>`;
 const transcript=history.map(m=>(m.role==="user"?"CLOSER: ":c.name.toUpperCase()+": ")+m.content).join("\n\n");
 const scoreSystem=`You are a senior resign-call coach reviewing a practice call. The client was ${c.name}. Core objection: "${c.readObj}". Correct handling: ${c.readText}${HARD_MODE?"\nNote: HARD MODE was on — the client was deliberately tougher. Judge technique on its merits; a 'no' after a strong attempt is still respectable.":""}

Grade the CLOSER on all of the following:
1. PROGRESS BEFORE MONEY: did they establish progress and reconnect to the client's deeper why BEFORE touching price or plans?
2. ISOLATED THE REAL OBJECTION: when multiple objections were stacked, did the closer find which one was the true blocker — rather than trying to answer all of them at once?
3. THE ISOLATION QUESTION: did they use a version of "if [stated concern] wasn't an issue, would you keep going?" to find the real blocker?
4. STAYED ON THE CLOSE: after handling an objection, did they come back with a clear ask — or did they drift to the next topic and let momentum die?
5. NO PRESSURE/GUILT/FEAR/EARLY DISCOUNT: did they avoid lecturing, scaring, guilting, or dropping the price before value landed?
6. MADE A CLEAR ASK: did they actually ask for the decision, or just present information and hope?
7. RIGHT SOLUTION FOR THE REAL PROBLEM: did the solution they offered match the actual blocker (e.g. creative bridge for a genuine money hard stop; installments for cost caution; pause-with-return-date for life chaos)?

CRITICAL: set "resigned" to true ONLY if, by the end of the transcript, the client clearly and explicitly agreed to continue/keep paying. If the client left, stayed hesitant, said they'd think about it, or the closer let them walk, "resigned" MUST be false. Your "outcome_line", "did_well", "to_fix" and "key_moment" must all be consistent with the "resigned" verdict — never describe a failure while marking resigned true.

Respond with ONLY valid JSON, no markdown: {"resigned":true|false,"score":0-100,"outcome_line":"one punchy sentence","did_well":["2-4 short specific points referencing what the closer actually said"],"to_fix":["2-4 short coaching points with specific better phrasing where possible"],"key_moment":"one sentence naming the single pivotal moment where the call was won or lost","isolation_used":true|false,"ask_made":true|false}`;
 try{
  const raw=await callClaude([{role:"user",content:"Practice call transcript:\n\n"+transcript}],scoreSystem,900);
  const r=JSON.parse(raw.replace(/```json|```/g,"").trim());
  // the transcript-based verdict is the single source of truth for win/loss
  // time pill
  let timeNote="";
  if(timed){if(r.resigned){const showMs=st.closedAt||elapsedMs;const mi=showMs/60000;const sp=mi<8?"⚡ Lightning close":mi<15?"Sharp close":"Closed on the wire";timeNote=`<div class="timepill ok">Resigned in ${fmtT(showMs)} of 30:00 · ${sp}</div>`;}
   else if(st.timedOut)timeNote=`<div class="timepill bad">Ran out the clock — 30:00</div>`;
   else timeNote=`<div class="timepill">Ended at ${fmtT(elapsedMs)}</div>`;}
  renderDebrief(r,c,timeNote);
 }catch(err){
  app.innerHTML=`<div class="card debrief"><h2>Couldn't score the call</h2><p class="lead">${err.message==="BAD_KEY"||err.message==="NO_KEY"?"Your API key was missing or rejected — re-enter it and try again.":err.message}</p>
   <button class="btn primary" style="margin-top:18px" id="bk">Back to lobby</button></div>`;
  document.getElementById("bk").onclick=renderLobby;
 }
}
function renderDebrief(r,c,timeNote){const pct=Math.max(0,Math.min(100,r.score|0));const circ=2*Math.PI*66;const off=circ*(1-pct/100);const win=!!r.resigned;
 app.innerHTML=`<div class="card debrief">
  <span class="eyebrow"><span class="dot"></span> Call debrief · ${c.name}${HARD_MODE?' · hard mode':''}</span>
  <div class="ring-wrap"><div class="ring"><svg width="150" height="150">
   <circle cx="75" cy="75" r="66" stroke="var(--panel-2)" stroke-width="12" fill="none"/>
   <circle cx="75" cy="75" r="66" stroke="${win?'var(--ok)':'var(--amber)'}" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="rf"/>
  </svg><div class="num"><b style="color:${win?'var(--ok)':'var(--amber)'}">${pct}</b><small>score</small></div></div>
  <div><div class="outcome ${win?'win':'loss'}">${win?'✓ RESIGNED':'✗ NOT CLOSED'}<small>${r.outcome_line||""}</small></div>${timeNote||""}</div></div>
  <div class="keymoment"><b>Pivotal moment</b><p>${r.key_moment||""}</p></div>
  <div class="db-checks" style="display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 2px">
   <div class="dbcheck ${r.isolation_used?"pass":"fail"}">${r.isolation_used?"✓":"✗"} Isolated the real objection</div>
   <div class="dbcheck ${r.ask_made?"pass":"fail"}">${r.ask_made?"✓":"✗"} Made a clear ask</div>
  </div>
  <div class="db-grid">
   <div class="db-box good"><h4>✓ What landed</h4><ul>${(r.did_well||[]).map(x=>`<li>${x}</li>`).join("")}</ul></div>
   <div class="db-box fix"><h4>↗ Sharpen next time</h4><ul>${(r.to_fix||[]).map(x=>`<li>${x}</li>`).join("")}</ul></div></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
   <button class="btn primary" id="again">↻ Run ${c.short} again</button>
   <button class="btn ghost" id="lobby">Pick another client</button></div></div>`;
 setTimeout(()=>{const rf=document.getElementById("rf");rf.style.transition="stroke-dashoffset 1.1s cubic-bezier(.4,0,.1,1)";rf.style.strokeDashoffset=off;},120);
 document.getElementById("again").onclick=()=>startCall(current);
 document.getElementById("lobby").onclick=renderLobby;
}

/* boot */
if(KEY)renderLobby();else renderSetup();
</script>
</body>
</html>
