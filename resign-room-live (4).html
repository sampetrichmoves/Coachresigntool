  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}

/* voice */
const QUALITY=/(google|natural|neural|premium|enhanced|siri|aria|jenny|guy|libby|sonia|ryan|wavenet)/i;
function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
if(window.speechSynthesis){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(g,seed){if(!voices.length)loadVoices();let en=voices.filter(v=>/^en(-|_)/i.test(v.lang));if(!en.length)en=voices.slice();
 const fem=/(female|woman|samantha|victoria|karen|moira|tessa|fiona|zira|susan|allison|ava|joanna|salli|serena|aria|jenny|libby|sonia)/i;
 const male=/(\bmale\b|daniel|alex|fred|david|mark|james|george|guy|aaron|matthew|oliver|ryan)/i;
 let pool=en.filter(v=>(g==="female"?fem:male).test(v.name));if(!pool.length)pool=en;
 const q=pool.filter(v=>QUALITY.test(v.name));const use=q.length?q:pool;return use[seed%use.length];}
function speak(t,g){if(!window.speechSynthesis||!t)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);const v=pickVoice(g,curSeed);if(v)u.voice=v;u.rate=.97;u.pitch=g==="female"?1.04:.96;speechSynthesis.speak(u);}
function stopSpeak(){if(window.speechSynthesis)speechSynthesis.cancel();}

/* timer */
function fmtT(ms){if(ms<0)ms=0;const s=Math.round(ms/1000);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function startTimer(){if(!TIMER_ON||!st)return;st.callStart=Date.now();tickTimer();st.timerInt=setInterval(tickTimer,1000);}
function tickTimer(){const el=document.getElementById("timer");if(!el||!st)return;const rem=st.callStart+1800000-Date.now();el.textContent=fmtT(rem);el.classList.toggle("warn",rem<=300000&&rem>60000);el.classList.toggle("crit",rem<=60000);if(rem<=0){el.textContent="0:00";stopTimer();st.timedOut=true;if(!st.over)endCall(true);}}
function stopTimer(){if(st&&st.timerInt){clearInterval(st.timerInt);st.timerInt=null;}if(st&&st.callStart&&!st.elapsedMs)st.elapsedMs=Date.now()-st.callStart;}

}

function keyBtn(){if(SHARED_KEY)return "";return `<button class="btn ghost sm" id="keybtn">⚙ API key</button>`;}
function wireKeyBtn(){const b=document.getElementById("keybtn");if(b)b.onclick=()=>renderSetup();}

function renderLobby(){stopSpeak();if(st)stopTimer();
 if(!KEY){renderSetup();return;}
 topbtns.innerHTML=keyBtn();wireKeyBtn();
 const g={1:[],2:[],3:[],4:[]};ORDER.forEach(k=>g[CLIENTS[k].diff].push(k));
 const gn={1:"Warm-up",2:"Standard",3:"Tricky",4:"Hard"};let secs="";
 [1,2,3,4].forEach(d=>{if(!g[d].length)return;let cc="";
  g[d].forEach(k=>{const c=CLIENTS[k];cc+=`<button class="client-card" data-k="${k}">
   <div class="cc-top"><div class="avatar ${c.avatarClass}">${c.name[0]}</div>
   <div><div class="cc-name">${c.name}<small>${c.sub}</small></div></div></div>
   <div class="cc-desc">${c.desc}</div>
   <div class="badges"><span class="badge obj">${c.obj}</span><span class="badge d${c.diff}">${c.diffLabel}</span></div></button>`;});
  secs+=`<div class="group-label">${gn[d]}</div><div class="clients">${cc}</div>`;});
 app.innerHTML=`<div class="card lobby">
  <span class="eyebrow"><span class="dot"></span> 12 clients · pick one and close the resign</span>
  <h2>Step into the call.</h2>
  <p class="lead">Each client is fictional but modeled on real resign conversations. They talk back out loud and the conversation goes wherever you take it — type or tap the mic. The meter shows how close they are to yes; the side panel tells you how to handle them. End the call any time for a scored debrief.</p>
  <div class="ctl-row">
   <div class="ctl hot"><label class="switch"><input type="checkbox" id="hm" ${HARD_MODE?"checked":""}><span class="slider"></span></label>
    <div class="hm-label">Hard mode ${HARD_MODE?'<span class="hardbadge">● on</span>':''}<small>Tougher clients, fewer easy wins.</small></div></div>
   <div class="ctl"><label class="switch"><input type="checkbox" id="tm" ${TIMER_ON?"checked":""}><span class="slider"></span></label>
    <div class="hm-label">Call timer (30 min)<small>Beat the clock — a faster resign is the real win.</small></div></div>
  </div>
  <details class="guide"><summary>▸ Running this live with your team (screen-share)</summary>
   <ol>
    <li><b>Share your screen with computer audio on</b> so the team hears the client — Zoom "Share sound," Teams "Include computer sound," Meet share-a-tab + "Share tab audio."</li>
    <li><b>Let a teammate ask the client questions:</b> use "Give remote control" (Zoom) / "Request control" (Teams &amp; Meet) so they can type or use the mic on your machine.</li>
    <li><b>No remote control?</b> Popcorn it — they call out the line, you type or speak it.</li>
    <li><b>Use Google Chrome</b> for the voice and mic. Typing always works.</li>
   </ol></details>
  ${secs}
  <p class="muted" style="margin-top:22px">Cardinal rule: state the price, then <b style="color:var(--amber)">wait</b>. Lead with progress before you ever talk money.</p>
 </div>`;
 document.querySelectorAll(".client-card").forEach(b=>b.addEventListener("click",()=>startCall(b.dataset.k)));
 const hm=document.getElementById("hm");if(hm)hm.onchange=e=>{HARD_MODE=e.target.checked;renderLobby();};
 const tm=document.getElementById("tm");if(tm)tm.onchange=e=>{TIMER_ON=e.target.checked;renderLobby();};
}

function startCall(key){current=key;curSeed=ORDER.indexOf(key);history=[];const c=CLIENTS[key];
 st={over:false,outcome:false,warmth:28,callStart:0,timerInt:null,timedOut:false,elapsedMs:0};
 topbtns.innerHTML=`${HARD_MODE?'<span class="hardbadge">● Hard mode</span>':''}${keyBtn()}
  <button class="btn ghost sm" id="leave">‹ Switch client</button>
  <button class="btn primary sm" id="end">End call &amp; score ›</button>`;
 wireKeyBtn();
 app.innerHTML=`<div class="callgrid">
  <div class="card chatcard">
   <div class="chat-head"><div class="avatar ${c.avatarClass}" style="width:42px;height:42px;font-size:1.05rem">${c.name[0]}</div>
    <div class="who">${c.name}<small>${c.obj} · ${c.diffLabel}${HARD_MODE?' · HARD':''}</small></div>
    <div class="hgroup">${TIMER_ON?'<span class="timer" id="timer">30:00</span>':''}<div class="live"><span class="pulse"></span> On call</div></div></div>
   <div class="meter"><span class="mlabel">Where they're at</span><div class="mbar"><div class="mfill" id="mfill"></div></div><span class="mstate" id="mstate"></span></div>
   <div class="stream" id="stream"></div>
   <div class="composer">
    <button class="micbtn" id="mic" title="Speak"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
    <textarea id="input" rows="1" placeholder="Say something to ${c.short}… (Enter to send)"></textarea>
    <button class="sendbtn" id="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
   </div>
  </div>
  <div class="side">
   <div class="panel read"><h3>◆ Coach's read</h3><div class="read-obj">${c.readObj}</div><div class="read-text">${c.readText}</div>
    <button class="hintbtn" id="hintBtn">💡 Show me a line</button><div class="hint-line" id="hintLine">"${c.hint}"</div></div>
   <div class="panel"><details class="objbox"><summary>The six objections</summary>
    <div class="obj-list">${SIX.map(o=>`<div class="obj-item" data-n="${o.n}"><b>${o.t}</b> ${o.r}</div>`).join("")}</div></details></div>
   <div class="panel"><h3>◆ Golden rule</h3><p class="rule">Lead with <b>progress</b>, reconnect to their <b>why</b>, then state the price and <b>wait</b>. Never discount into the silence.</p></div>
   <button class="btn primary" id="end2">End call &amp; get debrief</button>
  </div></div>`;
 document.getElementById("leave").onclick=()=>{stopTimer();renderLobby();};
 document.getElementById("end").onclick=()=>endCall();document.getElementById("end2").onclick=()=>endCall();
 document.getElementById("hintBtn").onclick=()=>document.getElementById("hintLine").classList.toggle("show");
 const input=document.getElementById("input"),send=document.getElementById("send");
 input.addEventListener("input",()=>{input.style.height="auto";input.style.height=Math.min(input.scrollHeight,130)+"px";});
 input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();turn();}});
 send.onclick=turn;setupMic();
 addMsg("client",c.opener,c);history.push({role:"assistant",content:c.opener});updateMeter();speak(c.opener,c.vg);startTimer();
}

function stateLabel(w,over,outcome){if(over)return outcome?["Resigned ✓","var(--ok)"]:["Call ended","var(--bad)"];
 if(w<18)return["Walking out","var(--rust)"];if(w<38)return["Resistant","var(--rust)"];if(w<54)return["Listening","var(--amber)"];
 if(w<70)return["Warming up","var(--amber)"];if(w<86)return["Close to yes","var(--lime)"];return["Ready to resign","var(--lime)"];}
function updateMeter(){const f=document.getElementById("mfill"),m=document.getElementById("mstate");if(!f)return;
 const[l,c]=stateLabel(st.warmth,st.over,st.outcome);f.style.width=Math.max(6,st.warmth)+"%";m.textContent=l;m.style.color=c;}

function addMsg(role,text,c){const stream=document.getElementById("stream");const d=document.createElement("div");d.className="msg "+role;
 if(role==="client"){d.innerHTML=`<span class="tag">${c.name}</span>${text}<button class="replaybtn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 18 12 6 20 6 4"/></svg> replay voice</button>`;d.querySelector(".replaybtn").onclick=()=>speak(text,c.vg);}
 else d.innerHTML=`<span class="tag">You · the closer</span>${text}`;
 stream.appendChild(d);stream.scrollTop=stream.scrollHeight;}
function showTyping(){const s=document.getElementById("stream");const t=document.createElement("div");t.className="typing";t.id="typing";t.innerHTML="<i></i><i></i><i></i>";s.appendChild(t);s.scrollTop=s.scrollHeight;}
function hideTyping(){const t=document.getElementById("typing");if(t)t.remove();}
function showErr(m){const s=document.getElementById("stream");const e=document.createElement("div");e.className="err";e.innerHTML=m;s.appendChild(e);s.scrollTop=s.scrollHeight;}

function parseState(reply){let warmth=null,resigned=false,text=reply;
 const m=reply.match(/STATE:\s*(\{[\s\S]*?\})\s*$/i);
 if(m){try{const j=JSON.parse(m[1]);if(typeof j.warmth==="number")warmth=Math.max(0,Math.min(100,j.warmth));resigned=j.resigned===true||j.resigned==="true";}catch(e){}text=reply.slice(0,m.index).trim();}
 text=text.replace(/STATE:\s*\{[\s\S]*$/i,"").trim();   // safety strip
 return {text,warmth,resigned};}

async function turn(){
 if(busy||!st||st.over)return;const input=document.getElementById("input");const text=input.value.trim();if(!text)return;
 const c=CLIENTS[current];addMsg("you",text);history.push({role:"user",content:text});
 input.value="";input.style.height="auto";busy=true;document.getElementById("send").disabled=true;showTyping();
 try{
  const sys=c.system+(HARD_MODE?HARD_ADD:"")+STATE_INSTR;
  const raw=await callClaude(history,sys,600);
  const p=parseState(raw);hideTyping();
  addMsg("client",p.text,c);history.push({role:"assistant",content:p.text});
  if(p.warmth!=null)st.warmth=p.warmth;
  if(p.resigned&&st.warmth>=80&&!st.closedAt)st.closedAt=Date.now()-st.callStart; // remember when a genuine yes landed (for speed), but don't declare the win here
  updateMeter();speak(p.text,c.vg);
  if(p.resigned||st.warmth>=86){input.placeholder="Sounds like a yes — hit ‘End call & score’ to lock it in.";}
 }catch(err){
  hideTyping();
  if(err.message==="NO_KEY"||err.message==="BAD_KEY"){showErr(`<b>Your API key needs attention.</b> It was missing or rejected — click "⚙ API key" up top to re-enter it.`);}
  else showErr(`<b>Couldn't reach Claude.</b> ${err.message}. Check your connection and try again.`);
 }finally{busy=false;if(st&&!st.over)document.getElementById("send").disabled=false;input.focus();}
}

function setupMic(){const mic=document.getElementById("mic");const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){mic.title="Voice input needs Chrome — type instead";mic.style.opacity=".4";return;}
 recog=new SR();recog.lang="en-US";recog.interimResults=true;recog.continuous=false;
 recog.onresult=e=>{let f="",i2="";for(let i=0;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)f+=t;else i2+=t;}const input=document.getElementById("input");input.value=(f||i2);input.style.height="auto";input.style.height=Math.min(input.scrollHeight,130)+"px";};
 recog.onend=()=>{recording=false;mic.classList.remove("rec");};recog.onerror=()=>{recording=false;mic.classList.remove("rec");};
 mic.onclick=()=>{if(recording){recog.stop();return;}stopSpeak();try{recog.start();recording=true;mic.classList.add("rec");}catch(e){}};}

/* ============================================================
   DEBRIEF (Claude-scored) + time pill
   ============================================================ */
async function endCall(force){stopSpeak();stopTimer();const c=CLIENTS[current];
 if((!history||history.length<3)&&!force){renderLobby();return;}
 const timed=TIMER_ON&&!!st.callStart;const elapsedMs=st.elapsedMs||(st.callStart?Date.now()-st.callStart:0);
 topbtns.innerHTML="";
 app.innerHTML=`<div class="card debrief" style="text-align:center;padding:60px 32px">
  <div class="spinner" style="border-top-color:var(--lime);border-color:rgba(200,242,58,.25);width:34px;height:34px;margin:0 auto 18px"></div>
  <h2 style="margin-bottom:6px">Reviewing the call…</h2><p class="muted">Scoring against the objection-handling framework.</p></div>`;
 const transcript=history.map(m=>(m.role==="user"?"CLOSER: ":c.name.toUpperCase()+": ")+m.content).join("\n\n");
 const scoreSystem=`You are a senior resign-call coach reviewing a practice call. The client was ${c.name}. Core objection: "${c.readObj}". Correct handling: ${c.readText}${HARD_MODE?"\nNote: HARD MODE was on — the client was deliberately tougher. Judge technique on its merits; a 'no' after a strong attempt is still respectable.":""}
Grade the CLOSER: did they lead with PROGRESS before money; reconnect to the WHY; handle this specific objection correctly (not a discount or lecture); avoid pressure/guilt/fear/early-discount; make a clear ASK; and did the client actually agree to continue (a real earned yes)?
CRITICAL: set "resigned" to true ONLY if, by the end of the transcript, the client clearly and explicitly agreed to continue/keep paying. If the client left, stayed hesitant, said they'd think about it, or the closer let them walk, "resigned" MUST be false. Your "outcome_line", "did_well", "to_fix" and "key_moment" must all be consistent with the "resigned" verdict — never describe a failure while marking resigned true.
Respond with ONLY valid JSON, no markdown: {"resigned":true|false,"score":0-100,"outcome_line":"one punchy sentence","did_well":["2-4 short points"],"to_fix":["2-4 short coaching points"],"key_moment":"one sentence naming the pivotal moment"}`;
 try{
  const raw=await callClaude([{role:"user",content:"Practice call transcript:\n\n"+transcript}],scoreSystem,900);
  const r=JSON.parse(raw.replace(/```json|```/g,"").trim());
  // the transcript-based verdict is the single source of truth for win/loss
  // time pill
  let timeNote="";
  if(timed){if(r.resigned){const showMs=st.closedAt||elapsedMs;const mi=showMs/60000;const sp=mi<8?"⚡ Lightning close":mi<15?"Sharp close":"Closed on the wire";timeNote=`<div class="timepill ok">Resigned in ${fmtT(showMs)} of 30:00 · ${sp}</div>`;}
   else if(st.timedOut)timeNote=`<div class="timepill bad">Ran out the clock — 30:00</div>`;
   else timeNote=`<div class="timepill">Ended at ${fmtT(elapsedMs)}</div>`;}
  renderDebrief(r,c,timeNote);
 }catch(err){
  app.innerHTML=`<div class="card debrief"><h2>Couldn't score the call</h2><p class="lead">${err.message==="BAD_KEY"||err.message==="NO_KEY"?"Your API key was missing or rejected — re-enter it and try again.":err.message}</p>
   <button class="btn primary" style="margin-top:18px" id="bk">Back to lobby</button></div>`;
  document.getElementById("bk").onclick=renderLobby;
 }
}
function renderDebrief(r,c,timeNote){const pct=Math.max(0,Math.min(100,r.score|0));const circ=2*Math.PI*66;const off=circ*(1-pct/100);const win=!!r.resigned;
 app.innerHTML=`<div class="card debrief">
  <span class="eyebrow"><span class="dot"></span> Call debrief · ${c.name}${HARD_MODE?' · hard mode':''}</span>
  <div class="ring-wrap"><div class="ring"><svg width="150" height="150">
   <circle cx="75" cy="75" r="66" stroke="var(--panel-2)" stroke-width="12" fill="none"/>
   <circle cx="75" cy="75" r="66" stroke="${win?'var(--ok)':'var(--amber)'}" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="rf"/>
  </svg><div class="num"><b style="color:${win?'var(--ok)':'var(--amber)'}">${pct}</b><small>score</small></div></div>
  <div><div class="outcome ${win?'win':'loss'}">${win?'✓ RESIGNED':'✗ NOT CLOSED'}<small>${r.outcome_line||""}</small></div>${timeNote||""}</div></div>
  <div class="keymoment"><b>Pivotal moment</b><p>${r.key_moment||""}</p></div>
  <div class="db-grid">
   <div class="db-box good"><h4>✓ What landed</h4><ul>${(r.did_well||[]).map(x=>`<li>${x}</li>`).join("")}</ul></div>
   <div class="db-box fix"><h4>↗ Sharpen next time</h4><ul>${(r.to_fix||[]).map(x=>`<li>${x}</li>`).join("")}</ul></div></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
   <button class="btn primary" id="again">↻ Run ${c.short} again</button>
   <button class="btn ghost" id="lobby">Pick another client</button></div></div>`;
 setTimeout(()=>{const rf=document.getElementById("rf");rf.style.transition="stroke-dashoffset 1.1s cubic-bezier(.4,0,.1,1)";rf.style.strokeDashoffset=off;},120);
 document.getElementById("again").onclick=()=>startCall(current);
 document.getElementById("lobby").onclick=renderLobby;
}

/* boot */
if(KEY)renderLobby();else renderSetup();
</script>
</body>
</html>
